name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: type-check & tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `pnpm build` produces .svelte-kit/cloudflare/_worker.js, which
      # src/worker.ts imports. Without it, svelte-check fails to resolve the
      # module on a fresh checkout. Building first also validates that the
      # production bundle compiles.
      - run: pnpm build

      - run: pnpm check

      - run: pnpm test
