name = "planpokr"
main = "src/worker.ts"
compatibility_date = "2025-09-15"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
preview_urls = false

routes = [
  { pattern = "planpokr.com", custom_domain = true },
  { pattern = "www.planpokr.com", custom_domain = true }
]

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "planpokr"
database_id = "7ebb6512-f64d-4d3b-a909-0020838c36b9"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

[vars]
# Clerk publishable key is safe to commit (it's used in the client bundle).
PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsucGxhbnBva3IuY29tJA"
CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsucGxhbnBva3IuY29tJA"
# Send the user home after sign-in / sign-up flows complete.
PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL = "/"
PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL = "/"
PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/"
PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/"

# Secrets (set via `wrangler secret put`, never committed):
#   CLERK_SECRET_KEY
#   ROOM_TOKEN_SECRET
